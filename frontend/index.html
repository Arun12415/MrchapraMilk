
<form class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                            <input type="text" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brandBlue focus:border-brandBlue outline-none transition" placeholder="John Doe" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                            <input type="tel" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brandBlue focus:border-brandBlue outline-none transition" placeholder="+91 98765 43210" required>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Select Milk Type</label>
                        <select class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brandBlue focus:border-brandBlue outline-none transition bg-white" required>
                            <option value="">Choose an option...</option>
                            <option value="a2">A2 Cow Milk (₹85/L)</option>
                            <option value="buffalo">Premium Buffalo Milk (₹95/L)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Delivery Address</label>
                        <textarea rows="3" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brandBlue focus:border-brandBlue outline-none transition" placeholder="Apartment, Street, Area..." required></textarea>
                    </div>

                    <button type="submit" class="w-full bg-brandGreen hover:bg-green-700 text-white font-bold text-lg py-4 rounded-xl shadow-lg transition transform hover:-translate-y-1">
                        Confirm Subscription
                    </button>
                    <p class="text-center text-xs text-gray-500 mt-4"><i class="fa-solid fa-lock mr-1"></i> Your data is secure. No upfront payment required to register.</p>
                </form>
            </div>
        </div>
    </section>

    <script>
        // 1. AWS Configuration
        const API_URL = "https://your-api-id.execute-api.ap-south-1.amazonaws.com/prod/subscribe";

        // 2. Form Handling Logic
        async function handleSubscription(event) {
            event.preventDefault(); 
            
            const submitBtn = event.target.querySelector('button');
            const originalText = submitBtn.innerText;
            
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            const formData = {
                name: document.querySelector('input[placeholder="John Doe"]').value,
                phone: document.querySelector('input[placeholder="+91 98765 43210"]').value,
                milkType: document.querySelector('select').value,
                address: document.querySelector('textarea').value,
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert("🎉 Success! Your fresh milk delivery is scheduled.");
                    event.target.reset();
                } else {
                    alert("Server Error. Please try again later.");
                }
            } catch (error) {
                alert("Connection Error. Please check your internet.");
            } finally {
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        }

        // 3. Mobile Menu Logic
        const mobileBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        mobileBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });

        // 4. Event Listeners
        document.querySelector('form').addEventListener('submit', handleSubscription);
    </script>
</body>
</html>
